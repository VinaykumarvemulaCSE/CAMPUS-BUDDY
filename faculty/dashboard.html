<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faculty Dashboard - Campus Buddy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1E3A8A;
  --accent: #DC2626;
  --bg: #F4F7FD;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background: var(--bg); min-height: 100vh; display: flex; }

.sidebar {
  width: 220px;
  min-height: 100vh;
  background: var(--primary);
  color: white;
  padding: 30px 20px;
  position: fixed;
}
.sidebar h2 { font-size: 1.1rem; margin-bottom: 20px; }
.sidebar ul { list-style: none; }
.sidebar ul li {
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 8px;
  cursor: pointer;
}
.sidebar ul li:hover { background: rgba(255,255,255,0.2); }
.sidebar a { color: white; text-decoration: none; }

.main {
  margin-left: 220px;
  padding: 40px;
  flex: 1;
}
.section {
  background: white;
  padding: 30px;
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  max-width: 500px;
}
.section h3 { margin-bottom: 20px; color: var(--primary); }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #374151; }
.form-group input {
  width: 100%;
  padding: 12px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-size: 14px;
}
.form-group input:focus { outline: none; border-color: var(--primary); }
input[type="file"] { padding: 8px; }
button.primary {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: var(--primary);
  color: white;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}
button.primary:hover { opacity: 0.95; }
button.primary:disabled { opacity: 0.6; cursor: not-allowed; }
#status { margin-top: 16px; font-size: 14px; min-height: 1.4em; }
#status.success { color: #059669; }
#status.error { color: #dc2626; }
#status.loading { color: #6b7280; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>👨‍🏫 Faculty Portal</h2>
  <ul>
    <li><a href="dashboard.html">Upload PDF</a></li>
    <li><a href="../auth.html?role=faculty">Logout</a></li>
  </ul>
</div>

<div class="main">
  <div class="section">
    <h3>Upload PDF to Firestore</h3>
    <p style="margin-bottom:20px;color:#6b7280;font-size:14px;">
      PDF text is extracted and stored in <strong>pdfUploads</strong> with a <strong>chunks</strong> subcollection for efficient search. Use department <strong>general</strong> or e.g. <strong>CSE</strong> for demo.
    </p>

    <div class="form-group">
      <label for="department">Department *</label>
      <input type="text" id="department" placeholder="e.g. CSE, ECE" maxlength="20">
    </div>
    <div class="form-group">
      <label for="uploadedBy">Your Faculty ID *</label>
      <input type="text" id="uploadedBy" placeholder="e.g. FAC001" maxlength="20">
    </div>
    <div class="form-group">
      <label for="fileInput">PDF File *</label>
      <input type="file" id="fileInput" accept="application/pdf">
    </div>
    <button type="button" class="primary" id="uploadBtn">Upload PDF</button>
    <p id="status"></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs";

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.mjs";

const firebaseConfig = {
  apiKey: "AIzaSyAUg_-OfZbAbal8FVqnXAhmGhLVIiLJs8o",
  authDomain: "campus-buddy-d7b44.firebaseapp.com",
  projectId: "campus-buddy-d7b44",
  storageBucket: "campus-buddy-d7b44.firebasestorage.app",
  messagingSenderId: "755786056822",
  appId: "1:755786056822:web:339f72096f6d4a62a8cb57"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uploadBtn = document.getElementById("uploadBtn");
const fileInput = document.getElementById("fileInput");
const departmentInput = document.getElementById("department");
const uploadedByInput = document.getElementById("uploadedBy");
const statusEl = document.getElementById("status");

// Pre-fill faculty ID from URL (?id=...)
const urlParams = new URLSearchParams(window.location.search);
const idFromUrl = urlParams.get("id");
if (idFromUrl) uploadedByInput.value = idFromUrl;

function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = type || "";
}

function chunkText(text, chunkSize = 100) {
  const words = text.split(/\s+/).filter(Boolean);
  const chunks = [];
  for (let i = 0; i < words.length; i += chunkSize) {
    chunks.push(words.slice(i, i + chunkSize).join(" "));
  }
  return chunks.length ? chunks : [""]; 
}

uploadBtn.addEventListener("click", async () => {
  const file = fileInput.files[0];
  const department = (departmentInput.value || "").trim();
  const uploadedBy = (uploadedByInput.value || "").trim();

  if (!file) { setStatus("Please select a PDF file.", "error"); return; }
  if (!department) { setStatus("Please enter the department.", "error"); return; }
  if (!uploadedBy) { setStatus("Please enter your Faculty ID.", "error"); return; }

  setStatus("Reading PDF...", "loading");
  uploadBtn.disabled = true;

  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const text = content.items.map(item => item.str).join(" ");
      fullText += text + "\n";
    }

    const trimmed = fullText.replace(/\s+/g, " ").trim();
    if (!trimmed) {
      setStatus("No text could be extracted from this PDF.", "error");
      uploadBtn.disabled = false;
      return;
    }

    setStatus("Uploading PDF and chunks to Firestore...", "loading");
    const chunks = chunkText(trimmed, 100);
    const now = new Date();

    // 1️⃣ Create PDF document in documents
    const pdfDocRef = await addDoc(collection(db, "documents"), {
      fileName: file.name,
      department,
      uploadedBy,
      createdAt: now
    });

    // 2️⃣ Upload each chunk to subcollection "chunks"
    for (let i = 0; i < chunks.length; i++) {
      await addDoc(collection(db, "documents", pdfDocRef.id, "chunks"), {
        text: chunks[i],
        pageNumber: i + 1
      });
    }

    setStatus(`Uploaded successfully! ${chunks.length} chunk(s) saved under PDF "${file.name}".`, "success");
    fileInput.value = "";

  } catch (err) {
    console.error(err);
    setStatus("Upload failed: " + (err.message || "Unknown error"), "error");
  } finally {
    uploadBtn.disabled = false;
  }
});
</script>
</body>
</html>
