<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Faculty Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#1E3A8A;
--bg:#F4F7FD;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{display:flex;background:var(--bg);}

.sidebar{
width:220px;
height:100vh;
background:var(--primary);
color:white;
padding:30px 20px;
position:fixed;
display:flex;
flex-direction:column;
}

.sidebar h2{margin-bottom:40px;font-size:18px;}

.sidebar ul{list-style:none;flex:1;}

.sidebar ul li{
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.sidebar ul li:hover,
.sidebar ul li.active{
background:rgba(255,255,255,0.2);
}

.main{
margin-left:220px;
padding:40px;
width:100%;
}

.section{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
max-width:900px;
}

input{
margin-top:10px;
padding:10px;
width:100%;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px 18px;
border:none;
border-radius:6px;
background:var(--primary);
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<div class="sidebar">
<h2>👨‍🏫 Faculty Portal</h2>
<ul>
<li onclick="show('home')" class="active">Home</li>
<li onclick="show('doc')">Upload Doc</li>
<li onclick="show('timetable')">Upload Timetable</li>
<li onclick="logout()">Logout</li>
</ul>
</div>

<div class="main">

<div id="home" class="section">
<h3>Welcome Faculty</h3>
<p>Manage documents and schedules here.</p>
</div>

<div id="doc" class="section" style="display:none;">
<h3>Upload Document</h3>
<input type="file">
<button>Upload</button>
</div>

<div id="timetable" class="section" style="display:none;">
<h3>Upload Timetable</h3>
<input type="file">
<button>Upload</button>
</div>

</div>

<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
document.querySelectorAll('.sidebar ul li').forEach(li=>li.classList.remove('active'));
event.target.classList.add('active');
}
function logout(){
window.location.href="../auth.html?role=faculty";
}
</script>

</body>
</html>
