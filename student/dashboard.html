<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard - Campus Buddy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f7fd;
  padding:40px;
}
.container{
  max-width:700px;
  margin:auto;
}
textarea{
  width:100%;
  padding:10px;
  height:80px;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  margin-top:10px;
  padding:10px 20px;
  background:#2563EB;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.response{
  margin-top:20px;
  padding:15px;
  background:white;
  border-radius:8px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  white-space: pre-wrap;
}
</style>
</head>
<body>

<div class="container">
<h2>🤖 Ask Campus Buddy</h2>
<textarea id="question" placeholder="Ask your question..."></textarea>
<button onclick="askQuestion()">Ask</button>
<div class="response" id="responseBox"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAUg_-OfZbAbal8FVqnXAhmGhLVIiLJs8o",
  authDomain: "campus-buddy-d7b44.firebaseapp.com",
  projectId: "campus-buddy-d7b44",
  storageBucket: "campus-buddy-d7b44.appspot.com",
  messagingSenderId: "755786056822",
  appId: "1:755786056822:web:339f72096f6d4a62a8cb57"
};

const GEMINI_API_KEY = "AIzaSyCs6Bw2ZJr128vhoJ2SMuem-l9TNxxNpX0";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const studentId = params.get("id") || "anonymous";

window.askQuestion = async function() {
  const question = document.getElementById("question").value.trim();
  const responseBox = document.getElementById("responseBox");
  if (!question) { alert("Enter question"); return; }

  responseBox.innerHTML = "🔍 Searching knowledge base...";

  try {
    // 1️⃣ Search PDF chunks in Firestore
    const uploadsSnapshot = await getDocs(collection(db, "pdfUploads"));
    let kbMatches = [];

    for (const fileDoc of uploadsSnapshot.docs) {
      const chunksSnapshot = await getDocs(collection(db, "pdfUploads", fileDoc.id, "chunks"));
      for (const chunkDoc of chunksSnapshot.docs) {
        const text = chunkDoc.data().text.toLowerCase();
        if (text.includes(question.toLowerCase())) {
          kbMatches.push(chunkDoc.data().text);
        }
      }
    }

    if (kbMatches.length) {
      // Summarize KB content using Gemini for better results
      responseBox.innerHTML = "🤖 Found relevant info in Knowledge Base. Summarizing...";
      const kbSummary = kbMatches.join("\n\n").slice(0, 2000); // Limit input tokens

      try {
        const geminiResponse = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              prompt: [
                { text: `Answer this question based on the following knowledge base:\n\n${kbSummary}\n\nQuestion: ${question}` }
              ],
              temperature: 0.7,
              maxOutputTokens: 512
            })
          }
        );

        const data = await geminiResponse.json();
        console.log("Gemini KB Summary Response:", data);

        const answer = data.candidates?.[0]?.output_text || data.candidates?.[0]?.content?.[0]?.text || kbMatches[0];
        responseBox.innerHTML = "📚 <b>Answer (from KB + AI):</b>\n\n" + answer;

      } catch (e) {
        console.error("AI summarization failed:", e);
        responseBox.innerHTML = "📚 Answer from KB:\n\n" + kbMatches[0];
      }
    } else {
      // 2️⃣ If not found in KB → Call Gemini directly
      responseBox.innerHTML = "🤖 Not found in KB. Asking AI...";
      let aiAnswer = "";

      try {
        const geminiResponse = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              prompt: [{ text: question }],
              temperature: 0.7,
              maxOutputTokens: 512
            })
          }
        );

        const data = await geminiResponse.json();
        console.log("Gemini Raw Response:", data);

        aiAnswer = data.candidates?.[0]?.output_text || data.candidates?.[0]?.content?.[0]?.text || "No answer returned by AI.";
        responseBox.innerHTML = "🤖 <b>AI Answer:</b>\n\n" + aiAnswer;

      } catch (e) {
        console.error("AI call failed:", e);
        responseBox.innerHTML = "❌ Failed to get AI answer.";
      }

      // 3️⃣ Create ticket in Firestore only if KB had no info
      await addDoc(collection(db, "tickets"), {
        studentId,
        question,
        answer: aiAnswer || "",
        createdAt: serverTimestamp(),
        status: "open"
      });
    }

  } catch (error) {
    console.error(error);
    responseBox.innerHTML = "❌ Error processing request.";
  }
};
</script>

</body>
</html>
